
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionDirector Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/bold/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    
    :root {
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --bg: #020202;
      --panel: #0a0a0c;
    }

    html, body, #root { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: #fafafa;
      margin: 0;
      padding: 0;

      /* ✅ allow vertical scroll on mobile */
      overflow-x: hidden;
      overflow-y: auto;
    }

    h1, h2, .font-mono {
      font-family: 'Space Grotesk', sans-serif;
    }

    .glass {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .scanline::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(139, 92, 246, 0.02) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scanline 10s linear infinite;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@^19.2.3",
      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
      "react/": "https://esm.sh/react@^19.2.3/",
      "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
    }
  }
  </script>
<!-- Optional project-level overrides (safe to keep even if empty) -->
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <!-- IMPORTANT: browsers cannot execute .tsx directly.
       Build first (npm run build) which outputs /index.js. -->
  <script type="module" src="/index.js"></script>
</body>
</html>
